volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: asemirkhan/taski_backend:latest
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/backend_static

  frontend:
    image: asemirkhan/taski_frontend:latest
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: asemirkhan/taski_gateway:latest
    env_file: .env
    depends_on:
      - backend
      - frontend
    volumes:
      - static_volume:/staticfiles
    ports:
      - "8000:80"
